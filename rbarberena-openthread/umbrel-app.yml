releaseNotes: >-
  This release includes various improvements and bug fixes across multiple integrations.


  Key highlights:
    - Improved handling of unavailable OAuth implementations for August and Yale integrations
    - Enhanced Bluetooth discovery for devices with alternating advertisement names
    - Various fixes and improvements for integrations like AsusWRT, PushSafer, and OpenUV


  Other notable changes:
    - Multiple URL and string updates to improve localization and configuration flows
    - Dependency updates for several integrations including Alexa Devices, Probe Plus, and VeSync
    - Corrections and enhancements for various sensors and device classes


  Full release notes are found at https://github.com/home-assistant/core/releases
