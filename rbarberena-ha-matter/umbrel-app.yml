manifestVersion: 1.2
id: rbarberena-ha-matter
name: HA Matter
tagline: Expose devices from Home Assistant as Matter devices
category: networking
version: "v3.0.3"
port: 8482
description: >-
  This project simulates bridges to publish your entities from Home Assistant to any Matter-compatible controller like Alexa, Apple Home or Google Home.

  Default URL points to Umbrel Home Assistant (http://127.0.0.1:8124/).
  Set HAMH_HOME_ASSISTANT_URL and HAMH_HOME_ASSISTANT_ACCESS_TOKEN (Long-Lived Access Token from Home Assistant profile) before starting if your setup differs.
